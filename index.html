<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | DevOpsss</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #38bdf8;
        }
        p {
            margin-top: 10px;
        }
        .box {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #38bdf8;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Nginx is Running!</h1>
        <p>Welcome to your DevOps test server</p>

        <div class="box">
            <p><strong>Server:</strong> Nginx</p>
            <p><strong>Status:</strong> Active ✅</p>
        </div>
    </div>
</body>
</html>
